<html lang="id">

<style>
:root{
  --brand-primary:#0A6E4E;
  --brand-p2:#0D8F65;
  --brand-accent:#D4A847;
  --page-bg:#FAFAF7;
  --page-text:#1A2419;
  --page-muted:#6B7C6A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;color:#fff}

/* ── TOP BAR ── */
.topbar{width:100%;max-width:940px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.topbar-brand{display:flex;align-items:center;gap:10px}
.logo-box{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand-primary),var(--brand-p2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 12px rgba(10,110,78,.4)}
.topbar-brand strong{font-size:16px;font-weight:800}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn-dl{background:linear-gradient(135deg,var(--brand-primary),var(--brand-p2));color:#fff;border:none;padding:10px 20px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(10,110,78,.35);transition:opacity .15s,transform .15s}
.btn-dl:hover{opacity:.9;transform:translateY(-1px)}
.btn-dl:disabled{opacity:.5;cursor:wait}

/* ── SCENE ── */
.scene{perspective:2200px;width:100%;max-width:920px}

/* ── BOOK ── */
.book{
  width:100%;display:grid;grid-template-columns:1fr 1fr;
  position:relative;
}

/* Book shadow */
.book::before{content:'';position:absolute;bottom:-16px;left:5%;width:90%;height:20px;background:rgba(0,0,0,.4);filter:blur(16px);border-radius:50%;z-index:-1}

/* Spine */
.book::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:18px;height:100%;background:linear-gradient(90deg,rgba(0,0,0,.3),rgba(0,0,0,.05),rgba(0,0,0,.3));z-index:10;pointer-events:none}

/* ── PAGES ── */
.page{
  background:var(--page-bg);
  min-height:580px;
  padding:44px 40px;
  position:relative;
  overflow:hidden;
  color:var(--page-text);
}

.page-l{
  border-radius:12px 0 0 12px;
  box-shadow:-12px 0 40px rgba(0,0,0,.5);
}

.page-r{
  border-radius:0 12px 12px 0;
  box-shadow:12px 0 40px rgba(0,0,0,.5);
}

/* Subtle page texture */
.page::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,.03) 27px,rgba(0,0,0,.03) 28px);pointer-events:none}

/* Page number */
.pg-num{position:absolute;bottom:18px;font-size:11px;color:var(--page-muted);font-weight:700;letter-spacing:.6px}
.page-l .pg-num{left:24px}
.page-r .pg-num{right:24px}

/* Page curl */
.page-r::after{content:'';position:absolute;bottom:0;right:0;width:28px;height:28px;background:linear-gradient(225deg,#e8e8e4 50%,transparent 50%);border-radius:0 0 12px 0}

/* ── FLIP ANIMATION ── */
.flip-overlay{
  position:absolute;
  top:0;right:0;
  width:50%;height:100%;
  transform-origin:left center;
  transform-style:preserve-3d;
  z-index:20;
  pointer-events:none;
  border-radius:0 12px 12px 0;
  overflow:hidden;
  display:none;
}

.flip-overlay.flipping-fwd{
  display:block;
  animation:flipFwd .55s cubic-bezier(.4,0,.2,1) forwards;
}
.flip-overlay.flipping-bwd{
  display:block;
  animation:flipBwd .55s cubic-bezier(.4,0,.2,1) forwards;
}

@keyframes flipFwd{
  0%{transform:rotateY(0deg);box-shadow:0 0 0 rgba(0,0,0,0)}
  40%{box-shadow:-20px 0 40px rgba(0,0,0,.2)}
  100%{transform:rotateY(-180deg);box-shadow:0 0 0 rgba(0,0,0,0)}
}
@keyframes flipBwd{
  0%{transform:rotateY(-180deg)}
  100%{transform:rotateY(0deg)}
}

/* ── PAGE CONTENT STYLES ── */
.pg-cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:480px;padding:40px}
.cover-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--brand-primary),var(--brand-p2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px;box-shadow:0 8px 24px rgba(10,110,78,.25)}
.cover-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:var(--page-text);line-height:1.2;margin-bottom:10px}
.cover-sub{font-size:13px;color:var(--page-muted);font-weight:600;line-height:1.6;max-width:240px}
.cover-line{width:40px;height:3px;background:linear-gradient(90deg,var(--brand-primary),var(--brand-accent));border-radius:3px;margin:16px auto}
.cover-edition{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--brand-accent);margin-top:12px}

.pg-chapter-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(10,110,78,.1);border:1px solid rgba(10,110,78,.2);color:var(--brand-primary);font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.pg-h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;line-height:1.25;color:var(--page-text);margin-bottom:12px}
.pg-h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--page-text);margin-bottom:10px;margin-top:20px}
.pg-p{font-size:13px;line-height:1.8;color:var(--page-muted);font-weight:500;margin-bottom:10px}
.pg-divider{height:1.5px;background:linear-gradient(90deg,var(--brand-primary),transparent);opacity:.15;margin:16px 0}

.callout{border-radius:10px;padding:13px 15px;margin:14px 0;display:flex;gap:10px}
.callout-tip{background:rgba(10,110,78,.07);border-left:3px solid var(--brand-primary)}
.callout-warn{background:rgba(212,168,71,.1);border-left:3px solid var(--brand-accent)}
.callout .ci{font-size:16px;flex-shrink:0;margin-top:1px}
.callout .ct strong{display:block;font-size:12px;font-weight:800;color:var(--brand-primary);margin-bottom:3px}
.callout-warn .ct strong{color:#7a5c00}
.callout .ct p{font-size:12px;line-height:1.6;color:var(--page-muted)}

.step-item{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-n{width:26px;height:26px;border-radius:8px;background:var(--brand-primary);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-b h4{font-size:13px;font-weight:800;margin-bottom:3px}
.step-b p{font-size:12px;color:var(--page-muted);line-height:1.6}

.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.tbl thead tr{background:var(--brand-primary)}
.tbl thead th{color:#fff;padding:8px 10px;text-align:left;font-weight:700;font-size:11px}

.tbl tbody td{padding:8px 10px;color:var(--page-text);font-weight:500}

.controls{display:flex;align-items:center;gap:14px;margin-top:24px}
.btn-nav{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}

.btn-nav:disabled{opacity:.25;cursor:not-allowed}
.page-info{font-size:13px;font-weight:700;color:rgba(255,255,255,.45);min-width:90px;text-align:center}

/* progress */
.prog{width:100%;max-width:920px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:16px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--brand-primary),var(--brand-p2));border-radius:3px;transition:width .3s}

</style>
</head>

const totalSpreads=Math.ceil(PAGES.length/2);
let current=0,animating=false;

function getSpreadPages(idx){
  return[PAGES[idx*2]||null,PAGES[idx*2+1]||null];
}

function setContent(el,page,numEl,num){
  if(!page){el.innerHTML='<span class="pg-num"></span>';return}
  el.innerHTML=page.html;
  const n=document.createElement('span');
  n.className='pg-num';n.textContent=num||'';
  el.appendChild(n);
}

function renderSpread(idx,animate,dir){
  if(animating)return;
  const[lp,rp]=getSpreadPages(idx);

  if(animate){
    animating=true;
    const overlay=document.getElementById('flipOverlay');
    const curR=document.getElementById('pageR');
    overlay.innerHTML=curR.innerHTML;
    overlay.style.cssText=`position:absolute;top:0;right:0;width:50%;height:100%;transform-origin:left center;z-index:20;pointer-events:none;border-radius:0 12px 12px 0;overflow:hidden;background:var(--page-bg)`;
    overlay.className='flip-overlay';
    void overlay.offsetWidth;
    overlay.classList.add(dir==='fwd'?'flipping-fwd':'flipping-bwd');
    setTimeout(()=>{
      setContent(document.getElementById('pageL'),lp,null,idx*2+1);
      setContent(document.getElementById('pageR'),rp,null,idx*2+2);
    },200);
    setTimeout(()=>{
      overlay.className='flip-overlay';
      overlay.style.display='none';
      animating=false;
      current=idx;updateUI();
    },560);
  }else{
    setContent(document.getElementById('pageL'),lp,null,idx*2+1);
    setContent(document.getElementById('pageR'),rp,null,idx*2+2);
    current=idx;updateUI();
  }
}

function updateUI(){
  const lp=current*2+1,rp=current*2+2;
  document.getElementById('pgInfo').textContent=rp<=PAGES.length?`${lp}–${rp} / ${PAGES.length}`:`${lp} / ${PAGES.length}`;
  document.getElementById('progFill').style.width=((current+1)/totalSpreads*100)+'%';
  document.getElementById('btnPrev').disabled=current===0;
  document.getElementById('btnFirst').disabled=current===0;
  document.getElementById('btnNext').disabled=current>=totalSpreads-1;
  document.getElementById('btnLast').disabled=current>=totalSpreads-1;
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===current));
}

function next(){if(!animating&&current<totalSpreads-1)renderSpread(current+1,true,'fwd')}
function prev(){if(!animating&&current>0)renderSpread(current-1,true,'bwd')}
function goFirst(){renderSpread(0,false)}
function goLast(){renderSpread(totalSpreads-1,false)}

/* Build thumbs */
(function(){
  const strip=document.getElementById('thumbs');
  for(let i=0;i<totalSpreads;i++){
    const d=document.createElement('div');
    d.className='thumb'+(i===0?' active':'');
    d.textContent=(i*2+1)+(i*2+2<=PAGES.length?'–'+(i*2+2):'');
    d.onclick=(()=>{const idx=i;return()=>renderSpread(idx,true,idx>current?'fwd':'bwd')})();
    strip.appendChild(d);
  }
})();

/* Initial render */
renderSpread(0,false);

/* Generate PDF via html2canvas + jsPDF */
async function generatePDF(){
  const btn=document.getElementById('btnDl');
  btn.disabled=true;btn.textContent='⏳ Menyiapkan...';
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const orig=current;

  for(let i=0;i<totalSpreads;i++){
    renderSpread(i,false);
    await sleep(150);
    const bookEl=document.getElementById('book');
    const canvas=await html2canvas(bookEl,{scale:1.5,useCORS:true,backgroundColor:'#FAFAF7'});
    const img=canvas.toDataURL('image/jpeg',0.92);
    if(i>0)doc.addPage();
    doc.addImage(img,'JPEG',0,0,297,210);
    btn.textContent=`⏳ ${Math.round((i+1)/totalSpreads*100)}%`;
  }

  renderSpread(orig,false);
  doc.save('guidebook.pdf');
  btn.disabled=false;btn.innerHTML='⬇ Unduh PDF';
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev()});
</script>
